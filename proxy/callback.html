<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>PlotArmor — Signing you in…</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1115;
        color: #e7e9ee;
      }
      @media (prefers-color-scheme: light) {
        body { background: #f5f6f8; color: #1a1c22; }
      }
      .card {
        text-align: center;
        padding: 2.5rem 2rem;
        max-width: 22rem;
      }
      .spinner {
        width: 38px;
        height: 38px;
        margin: 0 auto 1.25rem;
        border: 3px solid currentColor;
        border-right-color: transparent;
        border-radius: 50%;
        opacity: 0.6;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { font-size: 1.15rem; margin: 0 0 0.5rem; }
      p { margin: 0; opacity: 0.7; }
      .done .spinner { display: none; }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <div class="spinner"></div>
      <h1>Signing you in to PlotArmor…</h1>
      <p id="msg">This tab will close automatically.</p>
    </div>
    <script>
      // The PlotArmor extension reads the AniList token from this page's URL
      // fragment and closes the tab. If the token isn't present (someone opened
      // this page directly) or the extension isn't watching, show guidance.
      const hasToken = window.location.hash.includes("access_token");
      if (!hasToken) {
        document.getElementById("card").classList.add("done");
        document.getElementById("msg").textContent =
          "Open the PlotArmor popup and click Connect to sign in.";
        document.querySelector("h1").textContent = "Nothing to do here";
      }
    </script>
  </body>
</html>
