<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>PlotArmor</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1115;
        color: #e7e9ee;
        text-align: center;
      }
      @media (prefers-color-scheme: light) {
        body { background: #f5f6f8; color: #1a1c22; }
      }
      .wrap { padding: 2rem; max-width: 26rem; }
      p { opacity: 0.7; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>PlotArmor</h1>
      <p>
        Backend for the PlotArmor browser extension (AniList auth callback and
        spoiler-classification proxy). Nothing to see here.
      </p>
    </div>
  </body>
</html>
